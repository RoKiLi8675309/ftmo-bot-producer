# =============================================================================
# config.yaml – PROJECT PHOENIX V20.10 (ML UNCHOKE PROTOCOL)
# STATUS: LIVE TRADING | TARGET: PASS FTMO CHALLENGE (10% / 90 DAYS)
#
# STRATEGY FIXES (V20.10):
# 1. ML UNCHOKE: Removed rigid 55% confidence floor. Sizing dynamically utilizes 
#    mathematical break-even probabilities based on 1:3 R:R targets.
# 2. LATENCY GUARD REWRITE: Pipeline latency now evaluated using publish_time 
#    rather than market tick silence to prevent False Positive drops.
# 3. WFO OPTIMIZATION: Scrubbed dead search space dimensions for faster convergence.
# =============================================================================

# --- 🌍 ENVIRONMENT SPECIFIC ---
env:
  initial_balance: 50000.0
  mode: "LIVE" # Options: RESEARCH, PAPER, LIVE

# --- 📝 LOGGING CONFIGURATION ---
logging:
  level: "INFO"
  file_path: "ftmo_bot.log"
  max_size_mb: 10
  backup_count: 5
  human_friendly: true
  trade_audit_file: "trade_audit.jsonl"

# --- 🔌 BROKER CONNECTION ---
mt5:
  login: null 
  password: null
  server: "FTMO-Server"
  path: "C:\\Program Files\\FTMO MetaTrader 5\\terminal64.exe"
  timeout_seconds: 5

# --- 🧠 REDIS MICROSERVICE BROKER ---
redis:
  host: "localhost"
  port: 6379
  db: 0
  price_data_stream: "price_data_stream"
  candle_stream_key_prefix: "stream:new_candle"
  trade_request_stream: "trade_requests"
  closed_trade_stream_key: "stream:closed_trades"
  account_info_key: "account:info"
  position_state_key_prefix: "positions"
  monitor_features_prefix: "monitor:features:"
  engine_state_key: 'bot:engine_state'
  
  risk_keys:
    current_equity: "risk:current_equity"
    daily_drawdown: "risk:daily_dd"
    open_positions: "risk:positions"
    daily_pnl: "risk:daily_pnl"
    consecutive_losses: "risk:consecutive_losses"
    last_deal_time: "risk:last_deal_time"
    pause_trading_flag: "risk:pause_trading"
    daily_starting_equity: "risk:daily_starting_equity"
    kill_switch_active: "bot:state:kill_switch_active"
    midnight_freeze: "risk:midnight_freeze"
    last_reset_date: "risk:last_reset_date"
    penalty_box_prefix: "risk:penalty_box:"
  
  heartbeat_key: "producer:heartbeat"

postgres:
  dsn: "postgresql://postgres:password@localhost:5432/trading_db"

# --- ⚙️ PRODUCER SETTINGS ---
producer:
  tick_interval_seconds: 0.1
  process_priority: "HIGH"
  midnight_freeze_seconds: 300
  d1_update_interval: 60

# --- 📊 DATA SETTINGS ---
data:
  sampling_method: "imbalance" 
  volume_bar_threshold: 10.0   # Fast fluid data feeding
  imbalance_alpha: 0.05        # EWMA Forgetting Factor
  use_tick_rule: true
  download_start_date: "2023-01-01" 
  num_candles_producer: 50000
  num_candles_train: 10000000  # 10M Ticks
  num_candles_wfo: 10000
  num_candles_backtest: 1000000 # 1M Ticks

# --- 📐 FEATURE ENGINEERING ---
features:
  use_causal_features: true
  n_jobs: 20
  use_cache: true
  window_size: 50 
  
  use_log_returns: true
  use_parkinson_vol: true                
  use_amihud_liquidity: true 
  use_relative_volume: true                
  use_aggressor_ratio: true                
  use_choppiness: true
  use_vortex: true
  use_regime: true
  use_vol_breakout: true
  
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  
  choppiness:
    period: 14
    threshold: 60.0 
  vortex:
    period: 14
  
  d1_ema_period: 200
  entropy_window: 100
  entropy_threshold: 0.90
  
  fractional_differentiation:
    d: 0.4
    window: 30
    
  adx:
    period: 14
    threshold: 20.0 
  
  cyclical_time: true
  session_awareness: true
  cluster_context: true
  d1_context: true

# --- 🦅 PHOENIX STRATEGY PARAMETERS ---
phoenix_strategy:
  regime_enforcement: "DISABLED" 
  
  asset_regime_map:
    # V20.9 FIX: All tradable assets must be treated as Trend Breakout 
    # to mathematically satisfy the 1:2 R:R constraint.
    GBPJPY: "TREND_BREAKOUT" 
    USDJPY: "TREND_BREAKOUT"
    EURJPY: "TREND_BREAKOUT"
    AUDJPY: "TREND_BREAKOUT"
    GBPUSD: "TREND_BREAKOUT"
    EURUSD: "TREND_BREAKOUT"
    AUDUSD: "TREND_BREAKOUT" 
    USDCAD: "TREND_BREAKOUT" 

  enable_regime_a_entries: true          
  require_d1_trend: false  
  require_h4_alignment: false                  
  
  hurst_breakout_threshold: 0.52      
  hurst_mean_reversion_threshold: 0.45    
  ker_trend_threshold: 0.0003         
  
  bb_std_dev: 1.5                     
  rvol_volatility_trigger: 0.8        
  
  max_relative_volume: 35.0          
  volume_gate_ratio: 0.7            
  aggressor_threshold: 0.55          
  ml_confirmation_threshold: 0.55     # Hard floor     
  choppiness_threshold: 65.0       
  
  vpin_bucket_size: 1000
  vpin_threshold: 0.90
  gate_fdi_threshold: 1.60        

# --- 🧬 OPTIMIZATION SEARCH SPACE (OPTUNA) ---
optimization_search_space:
  n_models:
    min: 30
    max: 60
    step: 5
  grace_period:
    min: 200
    max: 600
    step: 50
  delta:
    min: 1.0e-6
    max: 1.0e-4
    log: true
  lambda_value:
    min: 6
    max: 15
    step: 1
  
  entropy_threshold:
    min: 0.80
    max: 0.95
  vpin_threshold:
    min: 0.80 
    max: 0.95
  
  tbm_barrier_width:
    min: 2.0  # FORCE 1:2 R:R Minimum
    max: 4.0  
  tbm_horizon_minutes:
    # V20.9 FIX: Drastically increased to let winners run. (12h to 48h)
    min: 720  
    max: 2880  
    step: 120
  tbm_drift_threshold:
    min: 1.0
    max: 2.0

# --- 🛡️ RISK MANAGEMENT (FTMO COMPLIANCE) ---
risk_management:
  account_currency: "USD"
  
  max_daily_loss_pct: 0.040 # Hardened to 4.0% to provide a 1% safety buffer against FTMO limits
  
  sizing_method: "risk_percentage" 
  fixed_lot_size: 0.01        
  
  base_risk_per_trade_percent: 0.0050  # Base Risk: 0.5% per trade
  scaled_risk_percent: 0.0075          # Scaled Risk: 0.75% when in profit buffer
  
  loss_cooldown_minutes: 15  
  min_margin_level_percent: 200.0

  pyramiding:
    enabled: false # Disabled to strictly enforce 1 trade per pair to prevent overexposure
    max_adds: 0 
    add_on_profit_r: 1.0  
    risk_per_add_percent: 0.0025 
  
  equity_ratchet:
    enabled: true
    step_percent: 0.05    
  
  max_currency_exposure: 4        
  max_open_trades: 100            
  max_risk_percent: 5.0          
  
  leverage:
    default: 30.0        
    minor: 30.0          
    gold: 20.0           
    indices: 20.0        
    crypto: 2.0          
  
  leverage_safety_divisor: 1.5
  
  max_leverage: 30.0
  max_lot_size: 50.0 
  min_lot_size: 0.01
  
  stop_loss_atr_mult: 1.5        
  take_profit_atr_mult: 3.0      # 1:2 Risk to Reward Ratio Baseline
  
  trailing_stop:
    # V20.9 Fix: We use the Python Engine's custom structural trail now.
    enabled: true        
    activation_r: 0.8        
    trail_trigger_r: 1.5        
    trail_dist_r: 0.5     
  
  risk_timezone: "Europe/Athens"
  
  session_control:
    enabled: true 
    start_hour_server: 10      
    liquidate_hour_server: 21  
  
  friday_entry_cutoff_hour: 16 
  friday_liquidation_hour_server: 21  
  
  commission_per_lot_rt: 5.0
  contract_size: 100000
  
  max_trades_per_day: 20          
  correlation_penalty_threshold: 0.85
  max_loss_usd: 5000.0
  hard_stop_equity_usd: 80000.0
  
  min_stop_loss_pips: 15.0 # Escape the Spread Trap

# --- 📈 TRADING PORTFOLIO ---
trading:
  symbols:
    # 8 Pairs Fully Restored
    - "EURJPY"  
    - "GBPUSD"  
    - "USDJPY"  
    - "AUDJPY"  
    - "EURUSD"
    - "GBPJPY"
    - "USDCAD"
    - "AUDUSD"
  
  auxiliary_symbols:
    # Context streaming
    - "NZDUSD"  
    - "USDCHF"  
    
  timeframe: "M15" 
  magic_number: 621001
  slippage: 3 
  limit_order_offset_pips: 0.1 
  limit_order_ttl_seconds: 60

# --- 🤖 ONLINE LEARNING ---
online_learning:
  model_type: "AdaptiveRandomForest"
  
  n_models: 60        
  grace_period: 200        
  delta: 0.00001        
  warning_delta: 0.001        
  lambda_value: 10        
  max_features: 'sqrt'    
  metric: "LogLoss"        
  
  burn_in_periods: 20    # Allows features to fully saturate
  
  volatility_gate:
    enabled: true
    min_atr_spread_ratio: 1.2  
  
  positive_class_weight: 1.0 
  negative_class_weight: 1.0
  
  meta_labeling_threshold: 0.50 
  
  tbm:
    horizon_minutes: 1440        
    barrier_width: 3.0        
    min_profit_pips: 40.0    # V20.9 FIX: Raised to 40 pips to absolutely dwarf spreads
    drift_threshold: 1.5 
  
  learning_horizon_sec: 900 

# --- 📰 NEWS FILTER ---
news_filter:
  enabled: true
  primary_url: "http://nfs.faireconomy.media/ff_calendar_thisweek.xml"
  backup_url: "https://www.forexfactory.com/calendar"
  buffer_minutes_before: 15  
  buffer_minutes_after: 15   
  restricted_events:
    USD: ["FOMC", "NFP", "CPI", "PPI", "GDP"] 
    GBP: ["BOE", "CPI"]
    JPY: ["BOJ"]
    AUD: ["RBA", "CPI"]
    EUR: ["ECB", "CPI"]
    CAD: ["BOC", "CPI"]

# --- 🔍 FORENSIC AUDIT ASSUMPTIONS ---
forensic_audit:
  enforce_spread: true
  max_slippage_pips: 2.0
  commission_per_lot: 5.0
  spread_pips:
    default: 1.6  
    GBPJPY: 4.5   
    USDJPY: 1.8   
    EURJPY: 2.5   
    AUDJPY: 3.0   
    GBPUSD: 2.0   
    EURUSD: 1.6   
    AUDUSD: 1.8   
    USDCAD: 2.8   
    GBPAUD: 8.0   
    EURAUD: 6.0   
    GBPNZD: 9.0   

# --- 🧠 WFO OPTIMIZATION ---
wfo:
  n_trials: 100
  train_years: 2
  test_months: 6
  min_trades_optimization: 8 # Prevent the Optimizer from falling back to blown/toxic trials
  
  # V20.9 FIX: Pushed risk options to 0.5% and 1.0% to actually clear the 10% FTMO target
  risk_per_trade_options: [0.0050, 0.0075, 0.0100]